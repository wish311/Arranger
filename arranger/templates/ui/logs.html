{% extends "ui/base.html" %}{% block title %}Logs - Arranger{% endblock %}{% block heading %}Logs{% endblock %}
{% block content %}<div class="card"><h2>Recent Logs</h2><div class="form-grid"><div class="field"><label>Level</label><select id="log_level_filter" onchange="loadLogs()"><option value="">All</option><option>INFO</option><option>WARNING</option><option>ERROR</option></select></div><div class="field"><label>App filter</label><input id="log_app_filter" oninput="loadLogs()" placeholder="radarr, sonarr"></div></div><br><div class="actions"><button onclick="loadLogs()">Refresh</button><a class="btn" href="/api/logs">Download JSON</a></div><pre id="log_output" class="logs">Loading…</pre></div><script>loadLogs();</script>{% endblock %}
